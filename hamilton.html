<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamilton</title>
    <style>
      html { font-size: 12px; }
      .sk-pulse { animation: sk-pulse 1.5s ease-in-out infinite; }
      @keyframes sk-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      .sk { background: #e5e7eb; border-radius: 6px; }
      .sk-row { display:flex; align-items:center; gap:0.75rem; background:#f9fafb; border-radius:12px; padding:0.75rem; }
      .sk-btns { display:flex; gap:0.25rem; flex-shrink:0; }
    </style>
  </head>
  <body>
    <div id="app">
      <div style="max-width:800px; margin:0 auto; padding:1rem;" class="sk-pulse">
        <div style="background:#fff; border-radius:12px; padding:1rem; margin-bottom:1rem; border:1px solid #e5e7eb;">
          <div class="sk" style="width:4rem; height:1rem; margin-bottom:0.75rem;"></div>
          <div class="sk" style="width:100%; height:2rem;"></div>
        </div>
        <div style="background:#fff; border-radius:12px; padding:1rem; border:1px solid #e5e7eb;">
          <div class="sk" style="width:14rem; height:1.2rem; margin-bottom:1rem;"></div>
          <div style="display:flex; flex-direction:column; gap:0.5rem;">
            <div class="sk-row"><div style="flex:1;"><div class="sk" style="width:55%; height:0.9rem; margin-bottom:0.35rem;"></div><div class="sk" style="width:35%; height:0.7rem;"></div></div><div class="sk-btns"><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div></div></div>
            <div class="sk-row"><div style="flex:1;"><div class="sk" style="width:65%; height:0.9rem; margin-bottom:0.35rem;"></div><div class="sk" style="width:45%; height:0.7rem;"></div></div><div class="sk-btns"><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div></div></div>
            <div class="sk-row"><div style="flex:1;"><div class="sk" style="width:45%; height:0.9rem; margin-bottom:0.35rem;"></div></div><div class="sk-btns"><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div></div></div>
            <div class="sk-row"><div style="flex:1;"><div class="sk" style="width:50%; height:0.9rem; margin-bottom:0.35rem;"></div></div><div class="sk-btns"><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div></div></div>
            <div class="sk-row"><div style="flex:1;"><div class="sk" style="width:40%; height:0.9rem; margin-bottom:0.35rem;"></div></div><div class="sk-btns"><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div></div></div>
            <div class="sk-row"><div style="flex:1;"><div class="sk" style="width:60%; height:0.9rem; margin-bottom:0.35rem;"></div></div><div class="sk-btns"><div class="sk" style="width:3.5rem; height:1.8rem;"></div><div class="sk" style="width:3.5rem; height:1.8rem;"></div></div></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/hamilton.ts"></script>
  </body>
</html>
